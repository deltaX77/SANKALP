<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANKALP — Mission Prep Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121613;
    --bg-2:#0d100e;
    --panel:#1a211c;
    --panel-2:#212b23;
    --border:#33402f;
    --border-dim:#293327;
    --olive:#4b5d3a;
    --olive-light:#6e8b3d;
    --brass:#c9a227;
    --brass-dim:#8a7220;
    --text:#e9e6dd;
    --text-dim:#9aa093;
    --text-faint:#666e60;
    --red:#b5453b;
    --red-dim:#7a352e;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 1200px 600px at 50% -10%, rgba(75,93,58,0.18), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--brass);color:#12160f;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.04em;}

  /* ===== Layout ===== */
  .shell{max-width:1180px;margin:0 auto;padding:0 20px 80px;}
  header.top{
    border-bottom:1px solid var(--border-dim);
    padding:22px 20px 0;
    margin-bottom:0;
  }
  .top-inner{max-width:1180px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;padding-bottom:16px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:38px;height:38px;border:2px solid var(--brass);border-radius:50%;
    display:flex;align-items:center;justify-content:center;position:relative;flex:none;
  }
  .brand-mark::before{content:'';position:absolute;width:6px;height:6px;background:var(--brass);border-radius:50%;}
  .brand-mark::after{
    content:'';position:absolute;inset:6px;border:1px solid var(--brass-dim);border-radius:50%;
  }
  .brand-text .kicker{font-size:10px;letter-spacing:0.28em;color:var(--text-faint);font-family:'JetBrains Mono',monospace;}
  .brand-text h1{font-size:26px;margin:0;font-weight:600;letter-spacing:0.06em;}
  .brand-text h1 span{color:var(--brass);}

  .io-buttons{display:flex;gap:8px;}
  .io-buttons input[type=file]{display:none;}

  nav.tabs{display:flex;gap:2px;margin-top:18px;border-top:1px solid var(--border-dim);}
  nav.tabs button{
    flex:none;background:none;border:none;color:var(--text-dim);
    font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.08em;
    font-size:13px;padding:12px 18px;cursor:pointer;position:relative;top:-1px;
    border-top:2px solid transparent;transition:color .15s;
  }
  nav.tabs button:hover{color:var(--text);}
  nav.tabs button.active{color:var(--brass);border-top-color:var(--brass);}

  main{padding-top:28px;}
  .view{display:none;}
  .view.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  h2.section-title{
    font-size:14px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;
    letter-spacing:0.18em;margin:0 0 14px;text-transform:uppercase;
  }

  /* ===== buttons ===== */
  .btn{
    font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--text);
    background:var(--panel-2);border:1px solid var(--border);border-radius:var(--radius);
    padding:8px 14px;cursor:pointer;transition:all .12s;
  }
  .btn:hover{border-color:var(--brass-dim);color:var(--brass);}
  .btn.primary{background:var(--brass);border-color:var(--brass);color:#161a12;}
  .btn.primary:hover{background:#dab438;color:#161a12;}
  .btn.ghost{background:none;border-color:transparent;color:var(--text-dim);}
  .btn.ghost:hover{color:var(--brass);border-color:transparent;background:none;}
  .btn.danger{color:var(--red);border-color:var(--red-dim);}
  .btn.danger:hover{border-color:var(--red);color:#fff;background:var(--red-dim);}
  .btn.small{padding:5px 10px;font-size:12px;}
  .icon-btn{
    background:none;border:1px solid var(--border);color:var(--text-dim);
    width:28px;height:28px;border-radius:var(--radius);cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;font-size:15px;line-height:1;
  }
  .icon-btn:hover{color:var(--red);border-color:var(--red-dim);}
  .icon-btn.check{color:var(--olive-light);}
  .icon-btn.check:hover{color:var(--brass);border-color:var(--brass-dim);}

  input[type=text], input[type=number], input[type=time], select, textarea{
    background:var(--bg-2);border:1px solid var(--border);color:var(--text);
    padding:8px 10px;border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:13px;
    outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--brass-dim);}
  input[type=checkbox]{accent-color:var(--brass);width:16px;height:16px;cursor:pointer;}

  /* ===== Dashboard ===== */
  .dash-grid{display:grid;grid-template-columns:280px 1fr;gap:24px;}
  @media(max-width:760px){.dash-grid{grid-template-columns:1fr;}}

  .dial-card{
    background:var(--panel);border:1px solid var(--border-dim);border-radius:var(--radius);
    padding:26px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .dial{
    width:170px;height:170px;border-radius:50%;position:relative;
    display:flex;align-items:center;justify-content:center;
  }
  .dial .hole{
    width:126px;height:126px;border-radius:50%;background:var(--panel);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border:1px solid var(--border-dim);
  }
  .dial .pct{font-family:'Oswald',sans-serif;font-size:38px;font-weight:600;color:var(--brass);line-height:1;}
  .dial .lbl{font-size:10px;color:var(--text-faint);letter-spacing:0.15em;margin-top:4px;font-family:'JetBrains Mono',monospace;}
  .rank{font-family:'Oswald',sans-serif;letter-spacing:0.1em;font-size:16px;color:var(--text);text-transform:uppercase;}
  .rank-stripes{display:flex;gap:4px;}
  .rank-stripes .stripe{width:22px;height:4px;background:var(--border);}
  .rank-stripes .stripe.on{background:var(--brass);}
  .dial-sub{font-size:12px;color:var(--text-dim);text-align:center;}

  .subject-bars{display:flex;flex-direction:column;gap:10px;}
  .sbar-row{display:grid;grid-template-columns:150px 1fr 46px;align-items:center;gap:12px;}
  .sbar-name{font-size:13px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sbar-track{height:8px;background:var(--bg-2);border:1px solid var(--border-dim);border-radius:2px;overflow:hidden;}
  .sbar-fill{height:100%;}
  .sbar-pct{font-size:12px;color:var(--text-faint);text-align:right;font-family:'JetBrains Mono',monospace;}

  .today-card{
    background:var(--panel);border:1px solid var(--border-dim);border-radius:var(--radius);
    padding:20px;margin-top:20px;
  }
  .today-list{display:flex;flex-direction:column;}
  .today-row{
    display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border-dim);
    font-size:13px;
  }
  .today-row:last-child{border-bottom:none;}
  .today-time{font-family:'JetBrains Mono',monospace;color:var(--brass);width:56px;flex:none;font-size:12px;}
  .today-tag{width:8px;height:8px;border-radius:50%;flex:none;}
  .empty{color:var(--text-faint);font-size:13px;padding:16px 0;}

  /* ===== Syllabus ===== */
  .subj-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .subj-grid{display:flex;flex-direction:column;gap:14px;}
  .subj-card{
    background:var(--panel);border:1px solid var(--border-dim);border-radius:var(--radius);overflow:hidden;
  }
  .subj-head{
    display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;
  }
  .subj-swatch{width:10px;height:10px;border-radius:2px;flex:none;}
  .subj-name{font-family:'Oswald',sans-serif;letter-spacing:0.03em;font-size:16px;flex:1;}
  .subj-meta{font-size:12px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;}
  .subj-caret{color:var(--text-faint);transition:transform .15s;font-size:11px;}
  .subj-card.open .subj-caret{transform:rotate(90deg);}
  .subj-body{display:none;border-top:1px solid var(--border-dim);padding:6px 16px 16px;}
  .subj-card.open .subj-body{display:block;}
  .topic-row{
    display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-dim);
  }
  .topic-row:last-of-type{border-bottom:none;}
  .topic-name{flex:1;font-size:13.5px;}
  .topic-name.done{color:var(--text-faint);text-decoration:line-through;}
  .add-topic-row{display:flex;gap:8px;margin-top:12px;}
  .add-topic-row input{flex:1;}
  .subj-progress-bar{width:70px;height:6px;background:var(--bg-2);border-radius:2px;overflow:hidden;flex:none;}
  .subj-progress-fill{height:100%;background:var(--brass);}

  .new-subject-form{
    display:flex;gap:8px;background:var(--panel);border:1px dashed var(--border);padding:14px;border-radius:var(--radius);margin-bottom:16px;
  }
  .new-subject-form input{flex:1;}

  /* ===== Planner ===== */
  .planner-grid{display:flex;flex-direction:column;gap:16px;}
  .day-card{background:var(--panel);border:1px solid var(--border-dim);border-radius:var(--radius);}
  .day-head{
    display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border-dim);
    background:var(--panel-2);
  }
  .day-idx{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint);
    letter-spacing:0.1em;flex:none;
  }
  .day-head input.day-date{
    font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--bg-2);border:1px solid var(--border);
    color:var(--text);padding:5px 8px;border-radius:var(--radius);color-scheme:dark;
  }
  .day-head input.day-date:hover, .day-head input.day-date:focus{border-color:var(--brass-dim);}
  .day-weekday{
    font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:0.06em;text-transform:uppercase;color:var(--brass);
  }
  .day-weekday.today{color:var(--olive-light);}
  .day-today-badge{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--olive-light);
    border:1px solid var(--olive);padding:2px 6px;border-radius:2px;text-transform:uppercase;flex:none;
  }
  .day-count{font-size:11px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;margin-left:auto;}
  .slot-list{padding:6px 16px;}
  .slot-row{
    display:grid;grid-template-columns:66px 10px 1fr auto auto;align-items:center;gap:10px;
    padding:9px 0;border-bottom:1px solid var(--border-dim);
  }
  .slot-row.done .slot-title{color:var(--text-faint);text-decoration:line-through;}
  .slot-row:last-of-type{border-bottom:none;}
  .slot-time{font-family:'JetBrains Mono',monospace;color:var(--brass);font-size:12.5px;}
  .slot-dot{width:8px;height:8px;border-radius:50%;}
  .slot-main{min-width:0;}
  .slot-title{font-size:13.5px;font-weight:600;}
  .slot-note{font-size:12px;color:var(--text-faint);margin-top:1px;}
  .slot-actions{display:flex;gap:6px;}
  .slot-add-btn{padding:10px 16px 14px;}
  .add-slot-form{
    display:grid;grid-template-columns:110px 1fr 1fr 90px 1fr auto;gap:8px;padding:12px 16px 16px;
    border-top:1px solid var(--border-dim);background:var(--bg-2);
  }
  @media(max-width:900px){.add-slot-form{grid-template-columns:1fr 1fr;}}
  .add-slot-form input, .add-slot-form select{width:100%;}

  .day-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}

  footer.foot{text-align:center;color:var(--text-faint);font-size:11px;padding:30px 0 0;font-family:'JetBrains Mono',monospace;letter-spacing:0.08em;}
  .foot-credit{margin-top:8px;font-size:10.5px;color:var(--text-faint);letter-spacing:0.06em;}
  .foot-credit span{color:var(--brass-dim);}
  .foot-contact{margin-top:10px;}
  .foot-contact a{color:var(--brass);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.06em;}
  .foot-contact a:hover{text-decoration:underline;}

  /* ===== Profile chip (header) ===== */
  .profile-chip{
    display:flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--border);
    border-radius:20px;padding:5px 12px 5px 5px;cursor:pointer;color:var(--text);font-family:'Inter',sans-serif;
    font-size:13px;font-weight:600;
  }
  .profile-chip:hover{border-color:var(--brass-dim);}
  .profile-chip .avatar{
    width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Oswald',sans-serif;font-size:11px;color:#161a12;flex:none;
  }

  /* ===== Auth screen ===== */
  .auth-wrap{max-width:420px;margin:60px auto;display:flex;flex-direction:column;align-items:center;gap:22px;}
  .auth-badge{
    width:56px;height:56px;border:2px solid var(--brass);border-radius:50%;position:relative;
  }
  .auth-badge::before{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;background:var(--brass);
    border-radius:50%;transform:translate(-50%,-50%);}
  .auth-badge::after{content:'';position:absolute;inset:9px;border:1px solid var(--brass-dim);border-radius:50%;}
  .auth-title-block{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .auth-title{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:0.08em;text-transform:uppercase;text-align:center;line-height:1.2;}
  .auth-sub{font-size:12.5px;color:var(--text-faint);text-align:center;font-family:'JetBrains Mono',monospace;letter-spacing:0.05em;line-height:1.5;}
  .auth-card{
    width:100%;background:var(--panel);border:1px solid var(--border-dim);border-radius:var(--radius);padding:24px;
  }
  .auth-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
  .auth-toggle button{
    flex:1;background:var(--bg-2);border:none;color:var(--text-dim);font-family:'Oswald',sans-serif;
    letter-spacing:0.06em;text-transform:uppercase;font-size:12.5px;padding:10px;cursor:pointer;
  }
  .auth-toggle button.active{background:var(--brass);color:#161a12;}
  .auth-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
  .auth-field label{font-size:11px;color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
  .auth-field input, .auth-field select{width:100%;padding:10px;}
  .auth-error{
    background:rgba(181,69,59,0.12);border:1px solid var(--red-dim);color:#e0a49e;font-size:12.5px;
    padding:8px 10px;border-radius:var(--radius);margin-bottom:14px;
  }
  .auth-hint{font-size:11.5px;color:var(--text-faint);text-align:center;margin-top:14px;font-family:'JetBrains Mono',monospace;}
  .auth-hint button{background:none;border:none;color:var(--brass);cursor:pointer;font-family:inherit;font-size:inherit;padding:0;text-decoration:underline;}
  .btn.block{width:100%;padding:11px;font-size:13.5px;}

  /* ===== Profile page ===== */
  .profile-grid{display:grid;grid-template-columns:260px 1fr;gap:24px;}
  @media(max-width:760px){.profile-grid{grid-template-columns:1fr;}}
  .profile-card{background:var(--panel);border:1px solid var(--border-dim);border-radius:var(--radius);padding:24px;text-align:center;}
  .profile-avatar{
    width:76px;height:76px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;
    font-family:'Oswald',sans-serif;font-size:28px;color:#161a12;
  }
  .profile-name{font-family:'Oswald',sans-serif;font-size:19px;letter-spacing:0.03em;}
  .profile-email{font-size:12px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;margin-top:2px;word-break:break-all;}
  .profile-stats{display:flex;flex-wrap:wrap;justify-content:center;gap:14px 10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border-dim);}
  .profile-stat b{display:block;font-family:'Oswald',sans-serif;font-size:20px;color:var(--brass);}
  .profile-stat span{font-size:10.5px;color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase;}
  .settings-card{background:var(--panel);border:1px solid var(--border-dim);border-radius:var(--radius);padding:22px;margin-bottom:16px;}
  .settings-row{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
  .settings-row label{font-size:11px;color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
  .settings-row input, .settings-row select{max-width:340px;}
  .settings-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:420px;}
  .danger-zone{border-color:var(--red-dim)!important;}
  .save-msg{font-size:12px;color:var(--olive-light);margin-left:10px;}
  .settings-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:460px;}
  @media(max-width:600px){.settings-grid3{grid-template-columns:1fr;}}
  .plan-badges{display:flex;flex-direction:column;gap:6px;margin-top:14px;}
  .plan-badge{
    display:flex;justify-content:space-between;align-items:center;padding:6px 10px;
    border-radius:var(--radius);border:1px solid var(--border-dim);background:var(--bg-2);
  }
  .plan-badge span{font-size:10px;color:var(--text-faint);letter-spacing:0.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
  .plan-badge b{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:0.03em;}
  .plan-badge.a{border-color:var(--brass-dim);}
  .plan-badge.a b{color:var(--brass);}
  .plan-badge.b b{color:var(--olive-light);}
  .plan-badge.c b{color:var(--text-dim);}

  /* ===== Fitness ===== */
  .fitness-top{display:grid;grid-template-columns:260px 1fr;gap:24px;margin-bottom:20px;}
  @media(max-width:760px){.fitness-top{grid-template-columns:1fr;}}
  .pie-card{
    background:var(--panel);border:1px solid var(--border-dim);border-radius:var(--radius);
    padding:20px;display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .pie-svg{width:200px;height:200px;}
  .pie-center-pct{font-family:'Oswald',sans-serif;font-size:30px;font-weight:600;fill:var(--brass);}
  .pie-center-sub{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--text-faint);letter-spacing:0.12em;text-transform:uppercase;}
  .pie-legend{display:flex;flex-direction:column;gap:8px;width:100%;}
  .pie-legend-row{display:grid;grid-template-columns:10px 1fr auto;align-items:center;gap:10px;font-size:12.5px;}
  .pie-legend-row .swatch{width:10px;height:10px;border-radius:2px;}
  .pie-legend-row .name{color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pie-legend-row .pct{font-family:'JetBrains Mono',monospace;color:var(--text-faint);font-size:11.5px;}
  .fitness-summary-card{
    background:var(--panel);border:1px solid var(--border-dim);border-radius:var(--radius);padding:20px;
  }
  .fitness-summary-card .rank{margin-bottom:4px;}

  /* ===== Plans & Countdown ===== */
  .plans-grid{display:flex;flex-direction:column;gap:14px;}
  .plan-card{
    background:var(--panel);border:1px solid var(--border-dim);border-radius:var(--radius);
    padding:18px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:18px;justify-content:space-between;
  }
  .plan-card-fields{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .plan-card-fields select, .plan-card-fields input[type=date]{min-width:140px;}
  .plan-tag{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--text-faint);
    text-transform:uppercase;flex:none;width:56px;
  }
  .countdown-row{display:flex;gap:10px;}
  .countdown-row.expired .countdown-box b{color:var(--red);}
  .countdown-box{
    background:var(--bg-2);border:1px solid var(--border-dim);border-radius:var(--radius);
    padding:6px 10px;text-align:center;min-width:52px;
  }
  .countdown-box b{display:block;font-family:'Oswald',sans-serif;font-size:18px;color:var(--brass);}
  .countdown-box span{font-size:9px;color:var(--text-faint);letter-spacing:0.1em;text-transform:uppercase;}
  .countdown-empty{font-size:12px;color:var(--text-faint);font-style:italic;}

/* ============================= ACCOUNTS / AUTH ============================= */
const EXAM_OPTIONS = ['NDA 1','NDA 2','CDS 1','CDS 2','AFCAT 1','AFCAT 2','CAPF','SSB / Other'];

function makeUser({name, email, password, plans, seed=false}){
  return {
    id: uid(),
    name, email: email.toLowerCase(), password,
    plans: (plans && plans.length ? plans : [{exam:EXAM_OPTIONS[0], date:''}]).map(p=>({id:uid(), exam:p.exam, date:p.date||''})),
    joinDate: todayISO(),
    ...(seed ? seedUserData() : emptyUserData())
  };
}
function findUserByEmail(email){
  return state.users.find(u=>u.email === String(email||'').toLowerCase().trim());
}
function cu(){ return state.users.find(u=>u.id===state.currentUserId) || null; }
function initials(name){
  return String(name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()).join('') || '?';
}
function avatarColorFor(id){
  let h=0; for(const c of String(id)) h = (h*31 + c.charCodeAt(0)) % PALETTE.length;
  return PALETTE[h];
}

const STORAGE_KEY = 'sankalp-state-v1';

/*
  NOTE (fix): this app is fully local — it says so right on the login screen
  ("Your account and study data are saved locally in this browser"). It used
  to also call out to http://127.0.0.1:8000 for login/signup/save, but no such
  server ships with this file, so that endpoint never exists for a real user.
  That silently broke real sign up and log in (only the "jump in instantly"
  demo shortcut worked, since it was the only path that skipped the API call).
  Auth and persistence are now handled entirely with localStorage, matching
  what the UI already promises.
*/

function defaultState(){
  return {
    users: [ makeUser({name:'Demo Aspirant', email:'demo@sankalp.app', password:'demo123', seed:true, plans:[
      {exam:'NDA 1', date: addDaysISO(todayISO(), 118)},
      {exam:'CDS 1', date: addDaysISO(todayISO(), 205)},
      {exam:'AFCAT 1', date: addDaysISO(todayISO(), 260)},
    ]}) ],
    currentUserId: null,
  };
}

function loadState(){
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if(!saved) return defaultState();
    const parsed = JSON.parse(saved);
    const users = Array.isArray(parsed.users) ? parsed.users : defaultState().users;
    const currentUserId = users.find(u=>u.id===parsed.currentUserId) ? parsed.currentUserId : null;
    return { users, currentUserId };
  } catch {
    return defaultState();
  }
}

function saveState(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch {}
}

let state = loadState();

/* ============================= HELPERS ============================= */
function subjColor(idx){ return PALETTE[idx % PALETTE.length]; }
function subjectIndex(id){ return cu().subjects.findIndex(s=>s.id===id); }
function getSubject(id){ return cu().subjects.find(s=>s.id===id); }
function getTopic(subj, topicId){ return subj ? subj.topics.find(t=>t.id===topicId) : null; }

function subjectProgress(subj){
  if(!subj.topics.length) return 0;
  const done = subj.topics.filter(t=>t.done).length;
  return Math.round(done/subj.topics.length*100);
}
function overallProgress(){
  let total=0, done=0;
  cu().subjects.forEach(s=>{ total+=s.topics.length; done+=s.topics.filter(t=>t.done).length; });
  return total ? Math.round(done/total*100) : 0;
}
function rankFor(pct){
  if(pct>=90) return {name:'Commander', stripes:5};
  if(pct>=70) return {name:'Officer', stripes:4};
  if(pct>=45) return {name:'Officer Cadet', stripes:3};
  if(pct>=20) return {name:'Cadet', stripes:2};
  return {name:'Recruit', stripes:1};
}
function timeToMinutes(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }

/* ---- fitness helpers ---- */
function fitColor(idx){ return PALETTE[(idx+3) % PALETTE.length]; }
function getFitCat(id){ return cu().fitness.find(c=>c.id===id); }
function fitnessOverallProgress(){
  let total=0, done=0;
  cu().fitness.forEach(c=>{ total+=c.topics.length; done+=c.topics.filter(t=>t.done).length; });
  return total ? Math.round(done/total*100) : 0;
}

/* ---- generic donut/pie chart builder (SVG) ---- */
function polarToCartesian(cx, cy, r, angleDeg){
  const rad = (angleDeg-90) * Math.PI/180;
  return { x: cx + r*Math.cos(rad), y: cy + r*Math.sin(rad) };
}
function describeDonutSlice(cx, cy, rOuter, rInner, startAngle, endAngle){
  const largeArc = (endAngle-startAngle) > 180 ? 1 : 0;
  const p0 = polarToCartesian(cx, cy, rOuter, startAngle);
  const p1 = polarToCartesian(cx, cy, rOuter, endAngle);
  const p2 = polarToCartesian(cx, cy, rInner, endAngle);
  const p3 = polarToCartesian(cx, cy, rInner, startAngle);
  return `M ${p0.x} ${p0.y} A ${rOuter} ${rOuter} 0 ${largeArc} 1 ${p1.x} ${p1.y} L ${p2.x} ${p2.y} A ${rInner} ${rInner} 0 ${largeArc} 0 ${p3.x} ${p3.y} Z`;
}
/**
 * categories: [{name, count, done, color}]
 * Slice angle is proportional to `count` (composition of the whole);
 * slice opacity reflects that category's own completion (done/count).
 */
function buildPieChart(categories, centerLabel, centerSub){
  const size = 220, cx = size/2, cy = size/2, rOuter = 100, rInner = 62;
  const total = categories.reduce((a,c)=>a+c.count, 0);
  let angle = 0;
  let slices = '';
  if(total === 0){
    slices = `<circle cx="${cx}" cy="${cy}" r="${(rOuter+rInner)/2}" fill="none" stroke="var(--border-dim)" stroke-width="${rOuter-rInner}"/>`;
  } else {
    categories.forEach(c=>{
      if(c.count===0) return;
      const sweep = (c.count/total)*360;
      const start = angle, end = angle + sweep - (sweep<360?1.5:0); // small gap between slices
      const opacity = 0.35 + 0.65 * (c.count ? c.done/c.count : 0);
      slices += `<path d="${describeDonutSlice(cx,cy,rOuter,rInner,start,Math.max(end,start+0.5))}" fill="${c.color}" fill-opacity="${opacity.toFixed(2)}"></path>`;
      angle += sweep;
    });
  }
  return `
    <svg viewBox="0 0 ${size} ${size}" class="pie-svg">
      ${slices}
      <text x="${cx}" y="${cy-6}" text-anchor="middle" class="pie-center-pct">${centerLabel}</text>
      <text x="${cx}" y="${cy+16}" text-anchor="middle" class="pie-center-sub">${centerSub}</text>
    </svg>
  `;
}

/* ---- date helpers (system date driven) ---- */
function todayISO(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function addDaysISO(iso, n){
  const d = new Date(iso+'T00:00:00');
  d.setDate(d.getDate()+n);
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function weekdayName(iso){
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString(undefined, {weekday:'long'});
}
function formatDatePretty(iso){
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString(undefined, {day:'2-digit', month:'short', year:'numeric'});
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============================= RENDER: DASHBOARD ============================= */
function renderDashboard(){
  const pct = overallProgress();
  const rank = rankFor(pct);
  const angle = pct*3.6;

  const stripesHtml = Array.from({length:5}).map((_,i)=>
    `<div class="stripe ${i<rank.stripes?'on':''}"></div>`).join('');

  const barsHtml = cu().subjects.map((s,i)=>{
    const p = subjectProgress(s);
    return `<div class="sbar-row">
      <div class="sbar-name">${escapeHtml(s.name)}</div>
      <div class="sbar-track"><div class="sbar-fill" style="width:${p}%;background:${subjColor(i)}"></div></div>
      <div class="sbar-pct">${p}%</div>
    </div>`;
  }).join('') || '<div class="empty">No subjects yet. Add one from the Syllabus tab.</div>';

  // pick today's day if present, else the nearest upcoming day, else the first day
  let todayHtml = '<div class="empty">No plan yet. Build one in Day-wise Planner.</div>';
  let focusDay = null;
  if(cu().days.length){
    const today = todayISO();
    focusDay = cu().days.find(d=>d.date===today);
    if(!focusDay){
      const upcoming = cu().days.filter(d=>d.date && d.date>today).sort((a,b)=>a.date.localeCompare(b.date));
      focusDay = upcoming[0] || cu().days[0];
    }
  }
  if(focusDay){
    const day = focusDay;
    const sorted = [...day.slots].sort((a,b)=>timeToMinutes(a.time)-timeToMinutes(b.time));
    if(sorted.length){
      todayHtml = sorted.map(sl=>{
        const subj = getSubject(sl.subjectId);
        const idx = subjectIndex(sl.subjectId);
        const topic = getTopic(subj, sl.topicId);
        return `<div class="today-row">
          <div class="today-time">${sl.time}</div>
          <div class="slot-dot" style="background:${subjColor(idx<0?0:idx)}"></div>
          <div style="flex:1;">
            <div style="font-weight:600;">${subj?escapeHtml(subj.name):'—'}${topic?' · '+escapeHtml(topic.name):''}</div>
          </div>
          <div class="mono" style="font-size:11px;color:var(--text-faint)">${sl.duration}m</div>
        </div>`;
      }).join('');
    }
  }

  document.getElementById('view-dashboard').innerHTML = `
    <div class="dash-grid">
      <div>
        <div class="dial-card">
          <div class="dial" style="background:conic-gradient(var(--brass) ${angle}deg, var(--border-dim) 0deg)">
            <div class="hole">
              <div class="pct">${pct}%</div>
              <div class="lbl">READINESS</div>
            </div>
          </div>
          <div class="rank">${rank.name}</div>
          <div class="rank-stripes">${stripesHtml}</div>
          <div class="dial-sub">Overall syllabus completed across all subjects. Keep grinding — every topic checked off moves your rank up.</div>
        </div>
      </div>
      <div>
        <h2 class="section-title">Subject-wise progress</h2>
        <div class="subject-bars">${barsHtml}</div>
        <div class="today-card">
          <h2 class="section-title" style="margin-bottom:10px;">${focusDay ? (focusDay.date===todayISO()?'Today':weekdayName(focusDay.date))+' · '+formatDatePretty(focusDay.date) : 'Up next'}</h2>
          <div class="today-list">${todayHtml}</div>
        </div>
      </div>
    </div>
  `;
}

/* ============================= RENDER: SYLLABUS ============================= */
function renderSyllabus(){
  const cardsHtml = cu().subjects.map((s,i)=>{
    const open = !!cu().ui.openSubjects[s.id];
    const p = subjectProgress(s);
    const topicsHtml = s.topics.map(t=>`
      <div class="topic-row">
        <input type="checkbox" data-action="toggle-topic" data-subject="${s.id}" data-topic="${t.id}" ${t.done?'checked':''}>
        <div class="topic-name ${t.done?'done':''}">${escapeHtml(t.name)}</div>
        <button class="icon-btn" data-action="remove-topic" data-subject="${s.id}" data-topic="${t.id}" title="Remove topic">×</button>
      </div>
    `).join('') || '<div class="empty">No topics yet — add the first one below.</div>';

    return `
      <div class="subj-card ${open?'open':''}" data-subject-card="${s.id}">
        <div class="subj-head" data-action="toggle-subject" data-subject="${s.id}">
          <span class="subj-caret">▶</span>
          <div class="subj-swatch" style="background:${subjColor(i)}"></div>
          <div class="subj-name">${escapeHtml(s.name)}</div>
          <div class="subj-progress-bar"><div class="subj-progress-fill" style="width:${p}%;background:${subjColor(i)}"></div></div>
          <div class="subj-meta">${s.topics.filter(t=>t.done).length}/${s.topics.length}</div>
          <button class="icon-btn" data-action="remove-subject" data-subject="${s.id}" title="Remove subject">×</button>
        </div>
        <div class="subj-body">
          ${topicsHtml}
          <div class="add-topic-row">
            <input type="text" placeholder="Add a topic (e.g. Modern History)" data-add-topic-input="${s.id}">
            <button class="btn small" data-action="add-topic" data-subject="${s.id}">Add topic</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('view-syllabus').innerHTML = `
    <div class="subj-toolbar">
      <h2 class="section-title" style="margin:0;">Syllabus tracker — tap a topic to mark it complete</h2>
    </div>
    <div class="new-subject-form">
      <input type="text" id="newSubjectInput" placeholder="New subject name (e.g. Computer Awareness)">
      <button class="btn primary" id="btnAddSubject">Add subject</button>
    </div>
    <div class="subj-grid">${cardsHtml || '<div class="empty">No subjects yet.</div>'}</div>
  `;
}

/* ============================= RENDER: FITNESS ============================= */
function renderFitness(){
  const cats = cu().fitness;
  const pieCats = cats.map((c,i)=>({
    name: c.name, count: c.topics.length, done: c.topics.filter(t=>t.done).length, color: fitColor(i)
  }));
  const overallPct = fitnessOverallProgress();
  const pieHtml = buildPieChart(pieCats, overallPct+'%', 'FIT READY');
  const legendHtml = pieCats.map(c=>{
    const pct = c.count ? Math.round(c.done/c.count*100) : 0;
    return `<div class="pie-legend-row">
      <div class="swatch" style="background:${c.color}"></div>
      <div class="name">${escapeHtml(c.name)}</div>
      <div class="pct">${c.done}/${c.count} · ${pct}%</div>
    </div>`;
  }).join('') || '<div class="empty">No categories yet.</div>';

  const cardsHtml = cats.map((c,i)=>{
    const open = !!cu().ui.openFitness[c.id];
    const p = subjectProgress(c);
    const exHtml = c.topics.map(t=>`
      <div class="topic-row">
        <input type="checkbox" data-action="toggle-fitex" data-cat="${c.id}" data-ex="${t.id}" ${t.done?'checked':''}>
        <div class="topic-name ${t.done?'done':''}">${escapeHtml(t.name)}</div>
        <button class="icon-btn" data-action="remove-fitex" data-cat="${c.id}" data-ex="${t.id}" title="Remove exercise">×</button>
      </div>
    `).join('') || '<div class="empty">No exercises yet — add the first one below.</div>';

    return `
      <div class="subj-card ${open?'open':''}">
        <div class="subj-head" data-action="toggle-fitcat" data-cat="${c.id}">
          <span class="subj-caret">▶</span>
          <div class="subj-swatch" style="background:${fitColor(i)}"></div>
          <div class="subj-name">${escapeHtml(c.name)}</div>
          <div class="subj-progress-bar"><div class="subj-progress-fill" style="width:${p}%;background:${fitColor(i)}"></div></div>
          <div class="subj-meta">${c.topics.filter(t=>t.done).length}/${c.topics.length}</div>
          <button class="icon-btn" data-action="remove-fitcat" data-cat="${c.id}" title="Remove category">×</button>
        </div>
        <div class="subj-body">
          ${exHtml}
          <div class="add-topic-row">
            <input type="text" placeholder="Add an exercise (e.g. Rope climbing)" data-add-fitex-input="${c.id}">
            <button class="btn small" data-action="add-fitex" data-cat="${c.id}">Add exercise</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('view-fitness').innerHTML = `
    <div class="subj-toolbar">
      <h2 class="section-title" style="margin:0;">Physical fitness tracker — tracked separately from academic syllabus</h2>
    </div>
    <div class="fitness-top">
      <div class="pie-card">
        ${pieHtml}
        <div class="pie-legend">${legendHtml}</div>
      </div>
      <div class="fitness-summary-card">
        <h2 class="section-title">Why fitness is separate</h2>
        <p style="font-size:13px;color:var(--text-dim);line-height:1.6;">
          Physical fitness for a defence exam is scored and trained differently from written subjects, so it gets its
          own tracker and its own pie chart here instead of being averaged into your academic readiness dial.
          Each slice of the chart is sized by how many exercises are in that category, and its brightness shows how
          much of that category you've completed — a fuller, brighter slice means you're closer to done.
        </p>
      </div>
    </div>
    <div class="new-subject-form">
      <input type="text" id="newFitCategoryInput" placeholder="New fitness category (e.g. Agility Drills)">
      <button class="btn primary" id="btnAddFitCategory">Add category</button>
    </div>
    <div class="subj-grid">${cardsHtml || '<div class="empty">No fitness categories yet.</div>'}</div>
  `;
}

/* ============================= RENDER: COUNTDOWN ============================= */
function planLabel(idx){
  return idx===0 ? 'Plan A' : 'Plan '+String.fromCharCode(65+idx); // A, B, C, D...
}
function countdownRowHtml(dateISO){
  if(!dateISO){
    return `<div class="countdown-empty">No exam date set yet</div>`;
  }
  return `
    <div class="countdown-row" data-countdown-target="${dateISO}">
      <div class="countdown-box"><b class="cd-days">--</b><span>Days</span></div>
      <div class="countdown-box"><b class="cd-hours">--</b><span>Hrs</span></div>
      <div class="countdown-box"><b class="cd-minutes">--</b><span>Min</span></div>
      <div class="countdown-box"><b class="cd-seconds">--</b><span>Sec</span></div>
    </div>
  `;
}
function renderPlans(){
  const u = cu();
  const plans = u.plans;
  const cardsHtml = plans.map((p, idx)=>`
    <div class="plan-card">
      <div class="plan-card-fields">
        <div class="plan-tag">${planLabel(idx)}</div>
        <select data-action="plan-exam" data-plan="${p.id}">${EXAM_OPTIONS.map(ex=>`<option ${ex===p.exam?'selected':''}>${ex}</option>`).join('')}</select>
        <input type="date" data-action="plan-date" data-plan="${p.id}" value="${p.date||''}">
        <button class="icon-btn" data-action="remove-plan" data-plan="${p.id}" title="Remove this plan" ${plans.length<=1?'disabled':''}>×</button>
      </div>
      ${countdownRowHtml(p.date)}
    </div>
  `).join('');

  document.getElementById('view-plans').innerHTML = `
    <div class="plans-toolbar">
      <h2 class="section-title" style="margin:0;">Your goals — add as many backup plans as you like, each with its own countdown</h2>
      <button class="btn primary small" id="btnAddPlan">+ Add plan</button>
    </div>
    <div class="plans-grid">${cardsHtml || '<div class="empty">No plans yet — add one above.</div>'}</div>
  `;
  tickCountdowns();
}

/* ---- live countdown ticker (runs independent of re-renders) ---- */
function tickCountdowns(){
  document.querySelectorAll('.countdown-row[data-countdown-target]').forEach(row=>{
    const iso = row.dataset.countdownTarget;
    const daysEl = row.querySelector('.cd-days'), hoursEl = row.querySelector('.cd-hours'),
          minsEl = row.querySelector('.cd-minutes'), secsEl = row.querySelector('.cd-seconds');
    if(!iso || !daysEl) return;
    const target = new Date(iso+'T00:00:00').getTime();
    const diff = target - Date.now();
    if(diff<=0){
      row.classList.add('expired');
      daysEl.textContent='0'; hoursEl.textContent='00'; minsEl.textContent='00'; secsEl.textContent='00';
      return;
    }
    row.classList.remove('expired');
    const totalSec = Math.floor(diff/1000);
    daysEl.textContent = Math.floor(totalSec/86400);
    hoursEl.textContent = String(Math.floor((totalSec%86400)/3600)).padStart(2,'0');
    minsEl.textContent = String(Math.floor((totalSec%3600)/60)).padStart(2,'0');
    secsEl.textContent = String(totalSec%60).padStart(2,'0');
  });
}
setInterval(tickCountdowns, 1000);

/* ============================= RENDER: PLANNER ============================= */
function subjectOptions(selectedId){
  return cu().subjects.map(s=>`<option value="${s.id}" ${s.id===selectedId?'selected':''}>${escapeHtml(s.name)}</option>`).join('');
}
function planOptionsHtml(selected){
  const placeholder = `<option value="" ${!selected?'selected':''} disabled>— Select —</option>`;
  return placeholder + EXAM_OPTIONS.map(ex=>`<option ${ex===selected?'selected':''}>${ex}</option>`).join('');
}
function topicOptions(subj, selectedId){
  if(!subj) return '<option value="">—</option>';
  return '<option value="">(no specific topic)</option>' + subj.topics.map(t=>`<option value="${t.id}" ${t.id===selectedId?'selected':''}>${escapeHtml(t.name)}</option>`).join('');
}

function renderPlanner(){
  const daysHtml = cu().days.map((day, dayIdx)=>{
    const sorted = [...day.slots].sort((a,b)=>timeToMinutes(a.time)-timeToMinutes(b.time));
    const slotsHtml = sorted.map(sl=>{
      const subj = getSubject(sl.subjectId);
      const idx = subjectIndex(sl.subjectId);
      const topic = getTopic(subj, sl.topicId);
      return `<div class="slot-row ${sl.done?'done':''}">
        <div class="slot-time">${sl.time}</div>
        <div class="slot-dot" style="background:${subjColor(idx<0?0:idx)}"></div>
        <div class="slot-main">
          <div class="slot-title">${subj?escapeHtml(subj.name):'(subject removed)'}${topic?' · '+escapeHtml(topic.name):''} <span class="mono" style="color:var(--text-faint);font-weight:400;font-size:11px;">${sl.duration}m</span></div>
          ${sl.note ? `<div class="slot-note">${escapeHtml(sl.note)}</div>` : ''}
        </div>
        <button class="icon-btn check" data-action="toggle-slot" data-day="${day.id}" data-slot="${sl.id}" title="Mark done">${sl.done?'✓':'○'}</button>
        <div class="slot-actions">
          <button class="icon-btn" data-action="remove-slot" data-day="${day.id}" data-slot="${sl.id}" title="Remove slot">×</button>
        </div>
      </div>`;
    }).join('') || '<div class="empty">No slots yet — add one below.</div>';

    const isToday = day.date === todayISO();
    return `
      <div class="day-card">
        <div class="day-head">
          <div class="day-idx">DAY ${dayIdx+1}</div>
          <input class="day-date" type="date" value="${day.date||''}" data-action="rename-day" data-day="${day.id}">
          <div class="day-weekday ${isToday?'today':''}">${weekdayName(day.date)}${day.date?', '+formatDatePretty(day.date):''}</div>
          ${isToday ? '<div class="day-today-badge">Today</div>' : ''}
          <div class="day-count">${day.slots.length} slot${day.slots.length===1?'':'s'}</div>
          <button class="icon-btn" data-action="remove-day" data-day="${day.id}" title="Remove day">×</button>
        </div>
        <div class="slot-list">${slotsHtml}</div>
        <form class="add-slot-form" data-action="add-slot" data-day="${day.id}">
          <input type="time" name="time" value="06:00" required>
          <select name="subjectId" data-role="subject-select">
            ${subjectOptions(cu().subjects[0]?.id)}
          </select>
          <select name="topicId" data-role="topic-select">
            ${topicOptions(cu().subjects[0], null)}
          </select>
          <input type="number" name="duration" min="5" step="5" value="45" placeholder="min" required>
          <input type="text" name="note" placeholder="Note (optional)">
          <button class="btn primary small" type="submit">Add slot</button>
        </form>
      </div>
    `;
  }).join('');

  document.getElementById('view-planner').innerHTML = `
    <div class="day-toolbar">
      <h2 class="section-title" style="margin:0;">Day-wise plan — edit, add or remove slots freely</h2>
      <button class="btn primary small" id="btnAddDay">+ Add day</button>
    </div>
    <div class="planner-grid">${daysHtml || '<div class="empty">No days yet.</div>'}</div>
  `;
}

/* ============================= SHELL (auth-gated layout) ============================= */
function renderShell(){
  const loggedIn = !!cu();
  document.getElementById('tabs').style.display = loggedIn ? 'flex' : 'none';
  document.getElementById('ioButtons').style.display = loggedIn ? 'flex' : 'none';
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  if(!loggedIn){
    renderAuth();
    document.getElementById('view-auth').classList.add('active');
  } else {
    renderAll();
    renderProfile();
    document.querySelectorAll('#tabs button').forEach(b=>b.classList.remove('active'));
    document.querySelector('#tabs button[data-view="dashboard"]').classList.add('active');
    document.getElementById('view-dashboard').classList.add('active');
  }
  saveState();
}
renderShell();
document.getElementById('footYear').textContent = new Date().getFullYear();

/* ============================= AUTH EVENTS ============================= */
document.getElementById('view-auth').addEventListener('click', e=>{
  const modeBtn = e.target.closest('[data-mode]');
  if(modeBtn){ authMode = modeBtn.dataset.mode; authError=''; renderAuth(); return; }
  if(e.target.id==='btnGoLogin'){ authMode='login'; authError=''; renderAuth(); return; }
  if(e.target.id==='btnUseDemo'){
    const demo = findUserByEmail('demo@sankalp.app');
    if(demo){ state.currentUserId = demo.id; authError=''; renderShell(); }
    return;
  }
});
document.getElementById('view-auth').addEventListener('submit', e=>{
  e.preventDefault();
  if(e.target.id==='formLogin'){
    const fd = new FormData(e.target);
    const email = fd.get('email'), password = fd.get('password');
    const u = findUserByEmail(email);
    if(!u || u.password !== password){
      authError = 'Invalid email or password.';
      renderAuth();
      return;
    }
    state.currentUserId = u.id;
    authError='';
    renderShell();
    return;
  }
  if(e.target.id==='formSignup'){
    const fd = new FormData(e.target);
    const name = fd.get('name').trim();
    const email = fd.get('email').trim();
    const planExam = fd.get('planExam');
    const planDate = fd.get('planDate') || '';
    const password = fd.get('password');
    if(!name || !email || !password){
      authError = 'Please fill in all required fields.';
      renderAuth();
      return;
    }
    if(findUserByEmail(email)){
      authError = 'An account with that email already exists — try logging in.';
      renderAuth();
      return;
    }
    if(!planExam){
      authError = 'Please choose a primary target exam to get started.';
      renderAuth();
      return;
    }
    const created = makeUser({name, email, password, plans:[{exam:planExam, date:planDate}]});
    state.users.push(created);
    state.currentUserId = created.id;
    authError='';
    renderShell();
  }
});

/* ============================= PROFILE EVENTS ============================= */
document.getElementById('view-profile').addEventListener('click', e=>{
  if(e.target.id==='btnLogout'){
    state.currentUserId = null;
    authMode='login'; authError='';
    renderShell();
    return;
  }
  if(e.target.id==='btnDeleteAccount'){
    const u = cu();
    if(!u) return;
    if(confirm('Permanently delete your account and all its data for this session?')){
      state.users = state.users.filter(x=>x.id!==u.id);
      state.currentUserId = null;
      renderShell();
    }
  }
});
document.getElementById('view-profile').addEventListener('submit', e=>{
  const u = cu();
  if(!u) return;
  if(e.target.id==='formProfileDetails'){
    e.preventDefault();
    const fd = new FormData(e.target);
    u.name = fd.get('name').trim() || u.name;
    saveState();
    renderProfile();
    renderProfileChip();
    document.getElementById('detailsSaveMsg').textContent = 'Saved.';
  }
  if(e.target.id==='formPassword'){
    e.preventDefault();
    const fd = new FormData(e.target);
    const oldPassword = fd.get('oldPassword'), newPassword = fd.get('newPassword');
    const errBox = document.getElementById('passwordError');
    if(oldPassword !== u.password){
      errBox.textContent = 'Current password is incorrect.';
      errBox.style.display='block';
      return;
    }
    u.password = newPassword;
    saveState();
    errBox.style.display='none';
    e.target.reset();
    document.getElementById('passwordSaveMsg').textContent = 'Password updated.';
  }
});

/* ============================= SYLLABUS EVENTS ============================= */
document.getElementById('view-syllabus').addEventListener('click', e=>{
  const rmSubj = e.target.closest('[data-action="remove-subject"]');
  if(rmSubj){
    const id = rmSubj.dataset.subject;
    const subj = getSubject(id);
    if(confirm(`Remove subject "${subj?subj.name:''}" and all its topics?`)){
      cu().subjects = cu().subjects.filter(s=>s.id!==id);
      // clean up planner slots pointing to this subject
      cu().days.forEach(d=>{ d.slots = d.slots.filter(sl=>sl.subjectId!==id); });
      renderAll();
    }
    return;
  }
  const head = e.target.closest('[data-action="toggle-subject"]');
  if(head){
    const id = head.dataset.subject;
    cu().ui.openSubjects[id] = !cu().ui.openSubjects[id];
    renderSyllabus();
    return;
  }
  const rmTopic = e.target.closest('[data-action="remove-topic"]');
  if(rmTopic){
    const subj = getSubject(rmTopic.dataset.subject);
    const topicId = rmTopic.dataset.topic;
    if(subj){
      subj.topics = subj.topics.filter(t=>t.id!==topicId);
      cu().days.forEach(d=>{ d.slots.forEach(sl=>{ if(sl.topicId===topicId) sl.topicId=''; }); });
      renderAll();
    }
    return;
  }
  const addTopic = e.target.closest('[data-action="add-topic"]');
  if(addTopic){
    const subj = getSubject(addTopic.dataset.subject);
    const input = document.querySelector(`[data-add-topic-input="${addTopic.dataset.subject}"]`);
    const val = input.value.trim();
    if(val && subj){
      subj.topics.push({id:uid(), name:val, done:false});
      cu().ui.openSubjects[subj.id] = true;
      renderAll();
    }
    return;
  }
});

document.getElementById('view-syllabus').addEventListener('change', e=>{
  const cb = e.target.closest('[data-action="toggle-topic"]');
  if(cb){
    const subj = getSubject(cb.dataset.subject);
    const topic = getTopic(subj, cb.dataset.topic);
    if(topic){ topic.done = cb.checked; renderAll(); }
  }
});

document.getElementById('view-syllabus').addEventListener('keydown', e=>{

    const subjId = e.target.getAttribute('data-add-topic-input');

      subj.topics.push({id:uid(), name:val, done:false});
      cu().ui.openSubjects[subj.id] = true;
      renderAll();
    }
  }
});

  }
});

document.getElementById('view-fitness').addEventListener('keydown', e=>{
  if(e.key==='Enter' && e.target.matches('[data-add-fitex-input]')){
    e.preventDefault();
    const catId = e.target.getAttribute('data-add-fitex-input');
    const val = e.target.value.trim();
    const cat = getFitCat(catId);
    if(val && cat){
      cat.topics.push({id:uid(), name:val, done:false});
      cu().ui.openFitness[cat.id] = true;
      renderAll();
    }
    return;
  }
  if(e.key==='Enter' && e.target.id==='newFitCategoryInput'){
    e.preventDefault();
    document.getElementById('btnAddFitCategory').click();
  }
});

/* ============================= PLANNER EVENTS ============================= */
document.getElementById('view-planner').addEventListener('click', e=>{
  if(e.target.id==='btnAddDay'){
    const last = cu().days[cu().days.length-1];
    const nextDate = last && last.date ? addDaysISO(last.date, 1) : todayISO();
    cu().days.push({id:uid(), date: nextDate, slots:[]});
    renderAll();
    return;
  }
  const rmDay = e.target.closest('[data-action="remove-day"]');
  if(rmDay){
    if(confirm('Remove this day and all its slots?')){
      cu().days = cu().days.filter(d=>d.id!==rmDay.dataset.day);
      renderAll();
    }
    return;
  }
  const rmSlot = e.target.closest('[data-action="remove-slot"]');
  if(rmSlot){
    const day = cu().days.find(d=>d.id===rmSlot.dataset.day);
    if(day){ day.slots = day.slots.filter(sl=>sl.id!==rmSlot.dataset.slot); renderAll(); }
    return;
  }
  const toggleSlot = e.target.closest('[data-action="toggle-slot"]');
  if(toggleSlot){
    const day = cu().days.find(d=>d.id===toggleSlot.dataset.day);
    const slot = day && day.slots.find(sl=>sl.id===toggleSlot.dataset.slot);
    if(slot){ slot.done = !slot.done; renderAll(); }
    return;
  }
});

document.getElementById('view-planner').addEventListener('change', e=>{
  const rename = e.target.closest('[data-action="rename-day"]');
  if(rename){
    const day = cu().days.find(d=>d.id===rename.dataset.day);
    if(day){ day.date = rename.value; renderAll(); }
    return;
  }
  // subject select changed inside an add-slot form -> refresh topic options
  const subjSelect = e.target.closest('[data-role="subject-select"]');
  if(subjSelect){
    const form = subjSelect.closest('form');
    const topicSelect = form.querySelector('[data-role="topic-select"]');
    const subj = getSubject(subjSelect.value);
    topicSelect.innerHTML = topicOptions(subj, null);
    return;
  }
});

document.getElementById('view-planner').addEventListener('submit', e=>{
  const form = e.target.closest('[data-action="add-slot"]');
  if(!form) return;
  e.preventDefault();
  const day = cu().days.find(d=>d.id===form.dataset.day);
  if(!day) return;
  const fd = new FormData(form);
  const time = fd.get('time');
  const subjectId = fd.get('subjectId');
  const topicId = fd.get('topicId') || '';
  const duration = parseInt(fd.get('duration'),10) || 30;
  const note = (fd.get('note')||'').trim();
  if(!time || !subjectId) return;
  day.slots.push({id:uid(), time, subjectId, topicId, duration, note, done:false});
  renderAll();
});

/* ============================= PLANS EVENTS ============================= */
document.getElementById('view-plans').addEventListener('click', e=>{
  if(e.target.id==='btnAddPlan'){
    const used = new Set(cu().plans.map(p=>p.exam));
    const nextExam = EXAM_OPTIONS.find(ex=>!used.has(ex)) || EXAM_OPTIONS[0];
    cu().plans.push({id:uid(), exam:nextExam, date:''});
    renderPlans();
    return;
  }
  const rm = e.target.closest('[data-action="remove-plan"]');
  if(rm){
    if(cu().plans.length<=1) return;
    if(confirm('Remove this plan and its countdown?')){
      cu().plans = cu().plans.filter(p=>p.id!==rm.dataset.plan);
      renderPlans();
      renderProfile();
    }
  }
});
document.getElementById('view-plans').addEventListener('change', e=>{
  const examSel = e.target.closest('[data-action="plan-exam"]');
  if(examSel){
    const p = cu().plans.find(x=>x.id===examSel.dataset.plan);
    if(p){ p.exam = examSel.value; renderProfile(); }
    return;
  }
  const dateInput = e.target.closest('[data-action="plan-date"]');
  if(dateInput){
    const p = cu().plans.find(x=>x.id===dateInput.dataset.plan);
    if(p){ p.date = dateInput.value; renderPlans(); renderProfile(); }
  }
});

/* ============================= EXPORT / IMPORT / RESET ============================= */
document.getElementById('btnExport').addEventListener('click', ()=>{
  const u = cu();
  if(!u) return;
  const data = JSON.stringify({
    name: u.name, plans: u.plans,
    subjects: u.subjects, fitness: u.fitness, days: u.days
  }, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sankalp-prep-data.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
});

document.getElementById('fileImport').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const u = cu();
  if(!u) return;
  const reader = new FileReader();
  reader.onload = evt=>{
    try{
      const parsed = JSON.parse(evt.target.result);
      if(parsed.subjects && parsed.days){
        u.subjects = parsed.subjects;
        u.days = parsed.days;
        u.fitness = parsed.fitness || seedUserData().fitness;
        if(Array.isArray(parsed.plans) && parsed.plans.length){
          u.plans = parsed.plans.map(p=>({id:p.id||uid(), exam:p.exam, date:p.date||''}));
        }
        u.ui = {openSubjects:{}, openFitness:{}, addingTopicFor:null};
        renderAll();
        alert('Data imported successfully.');
      } else {
        alert('This file does not look like a valid Sankalp export.');
      }
    }catch(err){
      alert('Could not read that file — make sure it is a Sankalp JSON export.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('btnReset').addEventListener('click', ()=>{
  const u = cu();
  if(!u) return;
  if(confirm('Reset to the default demo plan? This clears your current syllabus, fitness tracker and day plan (your account stays logged in).')){
    const fresh = seedUserData();
    u.subjects = fresh.subjects;
    u.fitness = fresh.fitness;
    u.days = fresh.days;
    u.ui = fresh.ui;
    renderAll();
  }
});
</script>
